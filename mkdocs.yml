# MkDocs configuration file for ensembl-orm documentation
site_name: ensembl-orm
site_description: Read-only SQLModel ORM for the Ensembl homo_sapiens_core MySQL database
site_author: Ensembl Team
site_url: https://hgnc.github.io/ensembl-orm/
repo_url: https://github.com/HGNC/ensembl-orm
edit_uri: edit/main/docs/

# Navigation structure
nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started.md
      - Configuration: configuration.md
  - API Reference:
      - Models: models.md
      - Querying: querying.md
      - API Documentation: api-reference.md
  - Development:
      - Development Workflow: development-workflow.md
      - Testing: testing.md

# Theme configuration
theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
    - mode:
      media: "(prefers-color-scheme: light)"
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - mode:
      media: "(prefers-color-scheme: dark)"
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.instant
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.annotate
    - content.code.copy

# Plugins
plugins:
  - search:
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: true
            show_if_no_docstring: true
            members: true
            member_order: source
            filters:
              - "!^_"
              - "!^__"
          paths: [src]

# Python documentation options
watch:
  - src/ensembl_orm

# Documentation files
exclude_docs: |
  /build/
  /scripts/

# Markdown extensions
markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - attr_list
  - md_in_html
  - admonition
  - toc:
      permalink: true
      toc_depth: 3

# Extra CSS
extra_css:
  - stylesheets/extra.css

# Extra JavaScript
extra_javascript:
  - javascripts/extra.js
