name: Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'src/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/docs.yml'
  pull_request:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'src/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      has_docs: ${{ steps.check_docs.outputs.has_docs }}
    steps:
      - uses: actions/checkout@v4
      - id: check_docs
        run: |
          if [ -f "mkdocs.yml" ] && [ -d "docs" ]; then
            echo "has_docs=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_docs=false" >> "$GITHUB_OUTPUT"
            echo "Skipping docs build — mkdocs.yml or docs/ not found"
          fi

  build:
    runs-on: ubuntu-latest
    needs: check
    if: needs.check.outputs.has_docs == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      # Resolves the project (incl. the db-common git source) plus the docs
      # toolchain. Plain `pip install -e .` cannot resolve db-common because it
      # is not on PyPI, so the build must go through uv.
      - name: Install dependencies
        run: uv sync --frozen --extra docs

      - name: Build docs
        run: uv run mkdocs build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
